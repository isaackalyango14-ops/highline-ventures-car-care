<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Highline Ventures HV monogram, enclosed in flat-top hexagon -->
  <!-- Hexagon: flat top and bottom, uniform 14px stroke, miter corners -->
  <polygon points="230,120 175,24.74 65,24.74 10,120 65,215.26 175,215.26" stroke="#D71920" stroke-width="14" stroke-linejoin="miter" fill="none"/>
  <!-- H: left stem, square corners -->
  <path d="M65 56 V184" stroke="#D71920" stroke-width="14" stroke-linecap="butt" stroke-linejoin="miter"/>
  <!-- H crossbar continuing directly into V as one path: clean 90 degree inside corner, no offset -->
  <path d="M65 120 H111 L139 184 L177 56" stroke="#D71920" stroke-width="14" stroke-linecap="butt" stroke-linejoin="miter" fill="none"/>
</svg>
